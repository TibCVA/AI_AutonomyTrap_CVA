ot an observed fact.'}),(0,i.jsx)("p",{style:{fontSize:"0.7rem",color:"var(--cva-cold-grey-1)",borderTop:"1px solid var(--cva-cold-grey-2)",paddingTop:8,marginTop:12},children:"Sources: IEA Energy and AI 2025 · Accenture Energy Digital Transformation Survey 2025 · Siemens Energy Grid Digitalization Benchmark 2025 · Grand View Research 2025 · Deloitte Renewable Energy Outlook 2026 · CVA analysis"})]}),e?.startsWith("S2")&&(0,i.jsxs)("div",{children:[(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"1. Why the use-case catalog fails"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:'The typical AI program identifies 50 to 100 use cases, filters to 10 to 15 pilots, runs proofs of concept for 3 to 6 months, and then stalls. The MIT "State of AI in Business 2025" report documents the funnel: of projects identified, roughly 65% are investigated, 28% reach pilot, and fewer than 5% are fully integrated into operations. The primary failure points are not technical. They are organizational: no process redesign, no change in decision rights, no governance framework, no named business sponsor with P&L accountability.'}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"2. The 10/20/70 rule"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"Cross-sector research on energy and industrial clients demonstrates that successful AI integration allocates 10% of effort to algorithms and models, 20% to data infrastructure and technology, and 70% to people, processes, and cultural transformation. This ratio is inverted in most energy AI programs, which spend 60%+ on technology and under 20% on operating model change. The result: technically successful pilots that cannot scale."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"3. The decision-first alternative"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"CVA's CORE® methodology inverts the approach. Instead of starting from available tools, it starts from the recurring decisions that drive operating performance. The process maps a priority stakeholder or operational journey end-to-end, identifies every decision point and data dependency (DIDA® protocol), and then determines which decisions can be augmented or automated, with what governance. This ensures AI is deployed where it creates value, not where it is technically easiest."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"4. Readiness overestimation"})}),(0,i.jsx)("p",{style:{marginBottom:8},children:'Published data show energy companies overestimate their AI readiness by an average of 1.8 maturity stages. A company that self-assesses at "Stage 3 (Systematic Deployment)" is typically at "Stage 1 (Ad-hoc Experimentation)" when independently assessed. This gap explains why so many programs fail at the pilot-to-production transition: the organizational prerequisites they assume are in place simply are not.'}),(0,i.jsx)("p",{style:{fontSize:"0.7rem",color:"var(--cva-cold-grey-1)",borderTop:"1px solid var(--cva-cold-grey-2)",paddingTop:8,marginTop:12},children:'Sources: MIT "State of AI in Business" 2025 · IEA 2025 · DTECH 2026 conference proceedings · CVA CORE® methodology'})]}),e?.startsWith("S3")&&(0,i.jsxs)("div",{children:[(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"1. What is a Decision-Action Loop (DAL)?"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"A DAL is a recurring operational decision that follows a structured pattern: trigger (sensor alert, threshold breach, timer, stakeholder request) → data gathering → analysis → decision → action → loop reset. DALs fire continuously across every energy operation. A network utility may have 200+ DALs across its operations; CVA maps the 12 most critical per archetype, representing 70 to 80% of the decision debt."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"2. The Autonomy Ladder (L0 to L4)"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:'L0: Fully human, no system support. L1: A tool assists (gathers data, suggests options), human decides and acts. L2: Agent recommends a decision with supporting evidence, human approves or overrides. L3: Agent decides and executes within defined bounds, human monitors and can intervene. L4: Full delegation within bounds, human notified of exceptions only. The current distribution across 36 mapped DALs: L0 = 4 DALs (11%), L1 = 26 DALs (72%), L2 = 6 DALs (17%), L3 = 0, L4 = 0. Total at L0 or L1: 83% (rounded to "over 80%" in the main text).'}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"3. Quantification methodology"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"Decision debt = human time on automatable decisions + cost of decision errors and rework + opportunity cost of cycle delays. For each archetype, CVA estimates: (a) FTE-equivalents consumed by manual DALs × loaded cost, (b) spend exposed to DAL-driven rework × net avoidable rate (6 to 14%, derived from sector benchmarks: 18% dispatch re-routing, 20 to 30% permit resubmission, 30% unnecessary maintenance, 12% unplanned downtime), (c) value exposed to cycle delays × capturable fraction at 2026 technology. These are model-based estimates, not observed facts."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"4. Results by archetype"})}),(0,i.jsx)("p",{style:{marginBottom:8},children:"Network utility (10 GW, 3,000 to 10,000 employees): $22 to $59M/yr, 2.2 to 3.7% of operating budget, $2.2 to $5.9k per MW/yr. Renewable IPP (3 GW, 200 to 800 employees): $11 to $32M/yr, 10 to 18% of operating budget, $3.7 to $10.7k per MW/yr. Mining operator (2 to 3 sites, 2,000 to 5,000 employees): $28 to $74M/yr, 3.1 to 4.9% of operating budget. The highest decision debt concentration is in L1 operational/tactical DALs, where the gap between current and attainable autonomy is largest."}),(0,i.jsx)("p",{style:{fontSize:"0.7rem",color:"var(--cva-cold-grey-1)",borderTop:"1px solid var(--cva-cold-grey-2)",paddingTop:8,marginTop:12},children:"Sources: CVA analysis 2026 (model-based) · IEA Energy and AI 2025 · NREL ATB 2024 · BLS Occupational Outlook 2024 · PSE&G investor presentation May 2025"})]}),e?.startsWith("S4")&&(0,i.jsxs)("div",{children:[(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"1. Key incidents analyzed"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"ENTSO-E zone separations (Jan and Jul 2021): two continental-scale grid separations caused by protection relay triggers and incomplete topology modeling. The January event traced to a bus coupler not represented in the day-ahead security model, preventing realistic automated analysis. AEMO SCADA losses (2021 to 2023): multiple incidents including a software bug causing system-wide SCADA loss, forcing manual operation by network operators. Port Augusta oscillations (Jun 2022): a code error in the solar farm's power plant controller, linked to a fail-safe test function, caused voltage and reactive power oscillations. 540 MW wind loss (2023): a misconfigured LVRT parameter (ride-through function disabled), combined with UPS maintenance gaps, caused the loss of an entire wind fleet during a network fault. GPS clock failure (2025): replacing a single GPS clock (already a single point of failure) with an incorrect date propagated through NTP, destroying SCADA monitoring. Escondida AHS (Aug 2025): two separate incidents involving autonomous haul trucks at BHP's copper mine in Chile."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"2. Common governance deficits"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"Across all 12 incidents, five governance patterns recur: (a) testing in non-representative environments (code tested in sandbox but not under real-time OT conditions), (b) no reconstructible audit trail (inability to replay the decision chain post-incident), (c) change management gaps (parameter changes, firmware updates, or hardware replacements without adequate verification), (d) single points of failure in critical infrastructure (GPS clocks, SCADA servers), (e) override procedures designed for timeframes humans cannot meet."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"3. Financial services benchmark"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"Knight Capital (2012): automated routing system sent millions of erroneous orders in 45 minutes, generating $460M in losses. Root cause: deployment error (old code reactivated). SEC imposed $12M penalty and remediation requirements. Flash Crash (2010): 5%+ market drop in minutes, driven by automated trading dynamics. Led to circuit breakers and limit-up/limit-down mechanisms. NYSE (2023/2026): simultaneous execution of primary and disaster-recovery systems caused auction errors; $9M penalty. In each case, the governance lesson is identical: the failure is never the algorithm, it is the deployment, testing, monitoring, and override architecture around it."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"4. Seven transposable governance principles"})}),(0,i.jsx)("p",{style:{marginBottom:8},children:"From financial services to energy: (1) agent/model registry with explicit ownership (direct transposability), (2) independent validation and revalidation after change (adaptable), (3) change management with rollback capability and soak time (direct), (4) end-to-end reconstructible audit trail (direct), (5) explicit autonomy limits with realistic override procedures (adaptable), (6) system-level kill switches and circuit breakers (adaptable), (7) external hazard intelligence integration (adaptable). The key structural difference: energy operates in real-time physics (seconds to minutes), not batch financial processing, which makes override design significantly harder."}),(0,i.jsx)("p",{style:{fontSize:"0.7rem",color:"var(--cva-cold-grey-1)",borderTop:"1px solid var(--cva-cold-grey-2)",paddingTop:8,marginTop:12},children:"Sources: AEMO incident reports 2021-2024 · ENTSO-E ICS reports 2021 · NERC Lessons Learned 2023-2025 · NRC event notifications 2024 · Reuters (Escondida) Aug 2025 · SEC orders (Knight Capital 2013, NYSE 2026) · Fed SR 11-7 · PRA SS1/23 · ESMA supervisory briefing Feb 2026 · CFTC 17 CFR Part 23"})]}),e?.startsWith("S5")&&(0,i.jsxs)("div",{children:[(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"1. What the EU AI Act requires for energy"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:'Annex III, Section 2 classifies as high-risk any AI system functioning as a "safety component" in the management or operation of critical infrastructure, including electricity, gas, heating, and water supply. The definition of "critical infrastructure" follows the Critical Entities Resilience Directive (EU 2022/2557), covering physical and digital assets across the entire energy value chain. An AI system qualifies as a safety component where its failure or malfunction could result in physical damage or harm to persons or property.'}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"2. Compliance obligations per system"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"For each high-risk AI system, providers and deployers must implement: a risk management system operated throughout the AI lifecycle, data governance covering training, validation, and testing datasets, technical documentation sufficient for conformity assessment, record-keeping enabling traceability of AI system operation, transparency obligations including user-facing disclosure, human oversight mechanisms proportionate to risk, accuracy, robustness, and cybersecurity requirements, and post-market monitoring with incident reporting to national authorities."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"3. Penalty structure"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"Prohibited AI practices: up to €35M or 7% of global annual turnover. High-risk non-compliance: up to €15M or 3%. Supplying incorrect information: up to €7.5M or 1%. National market surveillance authorities enforce for all systems except GPAI, which falls under the EU AI Office. Finland activated national supervision laws in January 2026, becoming the first member state with fully operational enforcement."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"4. The governance cost reality"})}),(0,i.jsx)("p",{style:{marginBottom:8},children:"CVA estimates governance infrastructure at 15 to 25% of total agentic operating costs. This includes: agent registry and inventory maintenance, continuous monitoring and drift detection, audit trail storage and retrieval, validation protocols and challenger reviews, incident response capability, regulatory reporting and conformity documentation, and interface with national supervisory authorities. AI2Work estimates compliance costs for large enterprises at $8 to $15M for high-risk systems. The Digital Omnibus proposal may extend certain deadlines to December 2027, but this extension is conditional and not guaranteed. Baker Botts recommends treating August 2, 2026 as the binding enforcement date."}),(0,i.jsx)("p",{style:{fontSize:"0.7rem",color:"var(--cva-cold-grey-1)",borderTop:"1px solid var(--cva-cold-grey-2)",paddingTop:8,marginTop:12},children:'Sources: EU AI Act (Regulation 2024/1689) · Baker Botts "What Energy Executives Should Know" March 2026 · European Commission FAQ Jan 2026 · appliedAI enterprise study · AI2Work compliance analysis · Digital Omnibus proposal Nov 2025 · Orrick EU AI Act Guide'})]}),e?.startsWith("S6")&&(0,i.jsxs)("div",{children:[(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"1. The Parity Trap explained"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:'When AI agents commoditize execution, the first movers who deploy faster dispatch, faster scheduling, or faster screening gain a temporary advantage. But competitors adopt the same tools within 12 to 18 months (CVA conviction based on technology diffusion patterns in energy). At that point, all operators have the same speed gains, and the value is competed away through lower margins or customer expectations resetting. This is "agentic parity," analogous to the digital parity that occurred when all utilities deployed the same CRM and billing platforms in the 2010s.'}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"2. The competitive barrier hierarchy"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"Four levels, in ascending order of defensibility. Speed and efficiency: real but temporary, matched in 12 to 18 months. Data advantages: proprietary datasets, exclusive rights, superior freshness and quality create durable advantage because agents are only as good as their data. Orchestration capability: the ability to coordinate complex multi-agent workflows, manage exceptions across DALs, and integrate OT/IT ecosystems builds progressively and compounds. Trust and governance: auditability, regulatory compliance track record, incident response capability, and explainability are the hardest to replicate once established. Winner-takes-trust dynamics apply because regulators, investors, and counterparties prefer operators with proven governance."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"3. The Pyramid-to-Diamond shift"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"The traditional organizational model is a pyramid: information flows up, decisions flow down, capacity scales by adding headcount. The agentic model is a diamond: agents execute routine work (compressing the base), a smaller number of higher-skilled orchestrators manage 50+ DALs each (expanding the middle), strategic leadership sets autonomy ceilings and barrier investments (narrowing the top), and exception handlers process edge cases in real-time. The supervision ratio shifts from 1:8 (manager to FTEs) to 1:50 (orchestrator to DALs/agents). Four new management archetypes emerge: Strategic Architect, DAL Orchestrator, Exception Handler, Trust and Governance Lead."}),(0,i.jsx)("p",{style:{marginBottom:8},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"4. The three-step sequence"})}),(0,i.jsx)("p",{style:{marginBottom:8},children:"Map: inventory every recurring DAL by value at stake, risk level, current autonomy, attainable autonomy, and primary barrier. This produces the decision debt diagnostic and the prioritized portfolio. Design: for each priority DAL, define target autonomy level, bounded autonomy rules (financial thresholds, quality gates, timing bounds, mandatory override switches), data requirements, escalation path, and named accountability. Build: agent registry, audit trail infrastructure, conformity documentation per EU AI Act, change management pipeline (test, stage, deploy, monitor, rollback), and circuit breakers (kill switches, anomaly detection, automatic escalation). The sequence matters because building governance without mapping decisions wastes resources, and mapping without designing autonomy produces analysis without action."}),(0,i.jsx)("p",{style:{fontSize:"0.7rem",color:"var(--cva-cold-grey-1)",borderTop:"1px solid var(--cva-cold-grey-2)",paddingTop:8,marginTop:12},children:"Sources: CVA convictions and methodology · Gartner agentic AI projections 2025-2026 · HBR/Palo Alto Networks AI security survey 2026 · Cloud Security Alliance 2026"})]}),e?.startsWith("S7")&&(0,i.jsxs)("div",{children:[(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"1. CORE® in detail"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"CORE® is delivered in three batches. Batch 1 (1 to 2 weeks): Diagnostic and Baseline. Map the end-to-end journey, measure baseline efficiency (FTE, timeframe), collect benchmarks and proof points, assess stakeholder satisfaction. Batch 2 (2 to 4 weeks): Target Construction. Design the target stakeholder journey, map the DIDA® flow (Data, Insight, Decision, Action), identify AI solutions and run proofs of concept, redesign processes and quantify lever impacts. Batch 3 (timing depends on scope): Trajectory. Build the execution plan, IT/data/AI technology trajectory, HR and workforce planning, financial trajectory and business case. The three transformation layers work simultaneously: the journey itself, the information chain (DIDA®), and the process architecture."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"2. DAWN® in detail"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"DAWN® is structured in two lots with three gates. Lot 1 (Future-back Baseline and Target Design): Module 1 maps the battlefield (where AI shifts value pools, which value chain steps are strategic to control), Module 2 designs the advantage system and target operating model (competitive barriers, DALs, autonomy ladders, bounded autonomy rules), Module 3 redesigns organization and workforce (new roles, skills, team sizing, human-agent-system Work Charts). Gate A validates the battlefield; Gate B locks the strategic posture. Lot 2 (Gap Analysis and Trajectory): Module 4 builds governance, risk, and trajectory (control framework, agent registry, audit trails, override protocols, 24-month gated roadmap), Module 5 stress-tests against endgame scenarios (three plausible futures plus one stress test, distinguishing safe bets from strategic options). Gate C authorizes first deployment."}),(0,i.jsx)("p",{style:{marginBottom:12},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"3. Starting points by archetype"})}),(0,i.jsx)("p",{style:{marginBottom:12},children:"Integrated utility or network operator: start with CORE® + DAWN® combined. Weather-driven volatility, ageing assets, and field-service pressure are already changing operating economics, role boundaries, and decision rights. The utility needs both journey redesign (connections, outage management) and operating model transformation (DALs, governance, workforce). Renewable IPP (connections, permitting, projects): start with CORE® first. The priority is to redesign the end-to-end journey, data flow, and control points to reduce cycle time, resubmissions, and execution risk. DAWN® follows once the first journey proves value. Mining or processing asset base: start with DAWN® first. Growing use of predictive models, copilots, and automation raises questions on role design, decision rights, safety control, and knowledge governance that go beyond one workflow."}),(0,i.jsx)("p",{style:{marginBottom:8},children:(0,i.jsx)("strong",{style:{color:"var(--cva-dark-blue)"},children:"4. CVA credentials"})}),(0,i.jsx)("p",{style:{marginBottom:8},children:"35+ years of experience in energy and industrials. 1,000+ projects completed. 19 offices in Europe, Middle East, Asia, Oceania, and North America. 300+ employees, 1,000+ experts in the network. Long-term partnerships with integrated energy companies, grid operators, nuclear operators, renewable developers, mining majors, and industrial utilities. CORE® and DAWN® are built on proven CVA heritage: LEAD® (corporate strategy), MOVE® (top-line improvement), and PRIME® (cost optimization) methodologies."}),(0,i.jsx)("p",{style:{fontSize:"0.7rem",color:"var(--cva-cold-grey-1)",borderTop:"1px solid var(--cva-cold-grey-2)",paddingTop:8,marginTop:12},children:"Sources: CVA methodology documentation · CVA project experience (client names withheld) · CORE® and DAWN® are proprietary CVA frameworks"})]})]}),(0,i.jsx)("section",{className:"sec-dark",style:{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",padding:"60px 24px",backgroundImage:"linear-gradient(180deg, rgba(31,43,79,0.55) 0%, rgba(31,43,79,0.85) 50%, rgba(31,43,79,0.97) 100%), url(data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAkGBwgHBgkIBwgKCgkLDRYPDQwMDRsUFRAWIB0iIiAdHx8kKDQsJCYxJx8fLT0tMTU3Ojo6Iys/RD84QzQ5Ojf/2wBDAQoKCg0MDRoPDxo3JR8lNzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzf/wAARCAQvB4ADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDxb8KOaTNFbkBSijtzR60AFFJRQAv1paSigBaSij8KAFooooAKO3FFL/KgBKX60fSjNABR2pKO1MBfrRRRQAUtHvRQAYpcHHFAPpRyaBCY9O1FL/WkoAKUUlGaADtRQaWmAh+lFFHagBaKSl96AAUv0pKM0AFFHNLjtQAh9KKXHrSUAKPaj8KKM0ALSUD86O9AAKU9eDSClFAAePag0Zo/rQAd+KB+NJSigAoHQUUfrQADnFFFHSgApaT6UtABSUtFAhO+KKDigZoAWj6UUdaAClFJRQAuaX+tNpeO9ADqPp1oApaBCYzTSKf1pMcUANJJo60EYopjF7Z6Un+c0vW
